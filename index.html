<script type="text/babel" data-presets="react">
    // The "Set up" button is hidden unless the URL ends with #<this word>.
    // Change it to any private word only you know.
    const ADMIN_CODE = "open-sesame";
const { useState, useEffect, useRef } = React;

/* ================================================================== */
/*  STEP 1 — paste your Firebase project values between the quotes.    */

/*  Until you do, the app runs in local-only mode on each device.      */

const firebaseConfig = {
    apiKey: "AIzaSyAYqyRx8id8c74XuuAU04-Q9sUrmhZQx0Y",
    authDomain: "screentime-7bb41.firebaseapp.com",
    projectId: "screentime-7bb41",
    databaseURL: "https://screentime-7bb41-default-rtdb.firebaseio.com/",
    storageBucket: "screentime-7bb41.firebasestorage.app",
    messagingSenderId: "474924623788",
    appId: "1:474924623788:web:46c8dd1c65d13ef1983c09",
    measurementId: "G-THDPBSZ0WC"
};
// Any private word. Keep it the same on every device; change it to start fresh.
const FAMILY_CODE = "eichelberger";
/* ================================================================== */

const SYNC_ENABLED =
  typeof firebase !== "undefined" &&
  firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf("PASTE") === -1 &&
  firebaseConfig.databaseURL && firebaseConfig.databaseURL.indexOf("PASTE") === -1;

/* ------------------------------------------------------------------ */
/*  Storage layer: cloud (when configured) with a localStorage mirror  */
/*  so the app loads instantly and still works offline / unconfigured. */
/* ------------------------------------------------------------------ */
const mem = {};
let cache = null;            // mirror of the cloud family node when synced
let familyRef = null;
let notifyRemote = () => {}; // App wires this to a re-render

const local = {
  get(k) {
    try { const v = localStorage.getItem(k); if (v != null) return JSON.parse(v); } catch (e) {}
    return k in mem ? mem[k] : null;
  },
  set(k, v) {
    mem[k] = v;
    try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {}
  },
};

const store = {
  getJSON(key) {
    if (cache && Object.prototype.hasOwnProperty.call(cache, key)) return cache[key];
    return local.get(key);
  },
  setJSON(key, val) {
    local.set(key, val);                       // always keep a local copy
    if (familyRef) { try { familyRef.child(key).set(val); } catch (e) {} }
  },
};

function initSync(onStatus) {
  if (!SYNC_ENABLED) { onStatus("off"); return; }
  try {
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    onStatus("connecting");
    auth.signInAnonymously().catch(() => onStatus("error"));
    auth.onAuthStateChanged((user) => {
      if (!user) return;
      familyRef = db.ref("families/" + FAMILY_CODE);
      familyRef.on(
        "value",
        (snap) => {
          cache = snap.val() || {};
          // First-time seed: if the cloud has no config yet, push this device's.
          if (!cache.config) {
            const lc = local.get("config");
            if (lc) { try { familyRef.child("config").set(lc); } catch (e) {} }
          }
          notifyRemote();
        },
        () => onStatus("error")
      );
      db.ref(".info/connected").on("value", (s) => onStatus(s.val() ? "on" : "connecting"));
    });
  } catch (e) {
    onStatus("error");
  }
}

/* ------------------------------------------------------------------ */
const DEFAULT_CONFIG = {
  kids: [
    { id: "k1", name: "Kid 1", accent: "#12B3A6" },
    { id: "k2", name: "Kid 2", accent: "#F5A524" },
  ],
  caps: { school: 90, weekend: 120 },
  banking: false,
  responsibilities: [
    { id: "r1", label: "Bed made" },
    { id: "r2", label: "Dishes cleared" },
    { id: "r3", label: "Homework done" },
    { id: "r4", label: "Room floor clear" },
  ],
  chores: [
    { id: "c1", label: "Load/unload dishwasher", min: 15 },
    { id: "c2", label: "Fold & put away laundry", min: 20 },
    { id: "c3", label: "Vacuum a room", min: 15 },
    { id: "c4", label: "Clean a bathroom", min: 25 },
    { id: "c5", label: "Trash & recycling out", min: 10 },
    { id: "c6", label: "Wipe counters / table", min: 10 },
    { id: "c7", label: "Feed / walk pet", min: 10 },
    { id: "c8", label: "Yard work (30 min)", min: 30 },
  ],
};

const ACCENTS = ["#12B3A6", "#F5A524", "#6C6BF5", "#EC5A8D", "#3B9BF0", "#5FB53A"];
const pad = (n) => String(n).padStart(2, "0");
const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
};
const isWeekend = () => {
  const g = new Date().getDay();
  return g === 0 || g === 6;
};
const fmt = (m) => {
  m = Math.max(0, Math.round(m));
  if (m < 60) return `${m}m`;
  const h = Math.floor(m / 60);
  const r = m % 60;
  return r ? `${h}h ${r}m` : `${h}h`;
};
const uid = () => Math.random().toString(36).slice(2, 8);

    /* summarize every stored day for one kid (earned vs used) */
    function gatherHistory(kidId) {
        const prefix = "day:" + kidId + ":";
        const days = {};
        const add = (k, v) => {
            if (k && k.indexOf(prefix) === 0 && !(k.slice(prefix.length) in days)) {
                days[k.slice(prefix.length)] = v;
            }
        };
        if (cache) Object.keys(cache).forEach((k) => add(k, cache[k]));
        try {
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k && k.indexOf(prefix) === 0) {
                    try { add(k, JSON.parse(localStorage.getItem(k))); } catch (e) {}
                }
            }
        } catch (e) {}
        Object.keys(mem).forEach((k) => add(k, mem[k]));
        return Object.keys(days).sort().map((date) => {
            const entries = (days[date] && days[date].entries) || [];
            const earned = entries.filter((e) => e.type === "earn").reduce((s, e) => s + e.min, 0);
            const used = entries.filter((e) => e.type === "spend").reduce((s, e) => s + e.min, 0);
            return { date, earned, used };
        });
    }

const SYNC_LABEL = { off: "This device", connecting: "Connecting…", on: "Synced", error: "Sync error" };

/* ------------------------------------------------------------------ */
function App() {
  const [config, setConfig] = useState(DEFAULT_CONFIG);
  const [activeKid, setActiveKid] = useState("k1");
  const [day, setDay] = useState({ respDone: {}, entries: [] });
  const [bank, setBank] = useState(0);
  const [ready, setReady] = useState(false);
  const [setupOpen, setSetupOpen] = useState(false);
  const [historyOpen, setHistoryOpen] = useState(false);
  const [floats, setFloats] = useState([]);
  const [customSpend, setCustomSpend] = useState("");
  const [syncState, setSyncState] = useState(SYNC_ENABLED ? "connecting" : "off");
  const [tick, setTick] = useState(0);
    const [admin, setAdmin] = useState(false);
    const floatId = useRef(0);
    const activeKidRef = useRef("k1");

    /* the "Set up" button only appears at the secret URL (…#<ADMIN_CODE>) */
    useEffect(() => {
        const check = () => setAdmin(window.location.hash.replace(/^#/, "") === ADMIN_CODE);
        check();
        window.addEventListener("hashchange", check);
        return () => window.removeEventListener("hashchange", check);
    }, []);

  /* mount: start sync + first local load */
  useEffect(() => {
    notifyRemote = () => setTick((t) => t + 1);
    initSync(setSyncState);
    const cfg = store.getJSON("config") || DEFAULT_CONFIG;
    setConfig(cfg);
    const kid = cfg.kids[0].id;
    activeKidRef.current = kid;
    setActiveKid(kid);
    loadKid(kid);
    setReady(true);
    return () => { notifyRemote = () => {}; };
  }, []);

  /* a cloud change arrived from another device: refresh what we show */
  useEffect(() => {
    if (!ready) return;
    const cfg = store.getJSON("config");
    if (cfg) setConfig(cfg);
    loadKid(activeKidRef.current);
  }, [tick]);

  function loadKid(kidId) {
    const raw = store.getJSON(`day:${kidId}:${todayKey()}`) || {};
    setDay({ respDone: raw.respDone || {}, entries: raw.entries || [] });
    const b = store.getJSON(`bank:${kidId}`);
    setBank(typeof b === "number" ? b : 0);
  }

  function saveConfig(c) { setConfig(c); store.setJSON("config", c); }
  function saveDay(d) { setDay(d); store.setJSON(`day:${activeKid}:${todayKey()}`, d); }
  function saveBank(b) { setBank(b); store.setJSON(`bank:${activeKid}`, b); }

  function switchKid(id) {
    activeKidRef.current = id;
    setActiveKid(id);
    loadKid(id);
  }

  const kid = config.kids.find((k) => k.id === activeKid) || config.kids[0];
  const cap = isWeekend() ? config.caps.weekend : config.caps.school;
  const earnedToday = day.entries.filter((e) => e.type === "earn").reduce((s, e) => s + e.min, 0);
  const spentToday = day.entries.filter((e) => e.type === "spend").reduce((s, e) => s + e.min, 0);
  const allRespDone =
    config.responsibilities.length > 0 &&
    config.responsibilities.every((r) => day.respDone[r.id]);
  const locked = !allRespDone;

  let remaining, capUsedLabel;
  if (config.banking) {
    remaining = Math.max(0, Math.min(cap - spentToday, bank));
    capUsedLabel = `Bank: ${fmt(bank)}`;
  } else {
    const pool = Math.min(earnedToday, cap);
    remaining = Math.max(0, pool - spentToday);
    capUsedLabel = earnedToday > cap ? `Earned ${fmt(earnedToday)} (capped)` : `Earned ${fmt(earnedToday)}`;
  }
  const fillPct = cap > 0 ? Math.min(100, (remaining / cap) * 100) : 0;

  function popFloat(text, positive) {
    const id = ++floatId.current;
    setFloats((f) => [...f, { id, text, positive }]);
    setTimeout(() => setFloats((f) => f.filter((x) => x.id !== id)), 950);
  }

  function addEarn(chore) {
    const entry = { id: uid(), type: "earn", min: chore.min, label: chore.label, ts: Date.now() };
    saveDay({ ...day, entries: [...day.entries, entry] });
    if (config.banking) saveBank(bank + chore.min);
    popFloat(`+${chore.min}m`, true);
  }

  function spend(min) {
    if (locked || min <= 0 || min > remaining) return;
    const entry = { id: uid(), type: "spend", min, label: "Screen time", ts: Date.now() };
    saveDay({ ...day, entries: [...day.entries, entry] });
    if (config.banking) saveBank(bank - min);
    popFloat(`\u2212${min}m`, false);
    setCustomSpend("");
  }

  function toggleResp(id) {
    saveDay({ ...day, respDone: { ...day.respDone, [id]: !day.respDone[id] } });
  }

  function undoLast() {
    if (day.entries.length === 0) return;
    const last = day.entries[day.entries.length - 1];
    saveDay({ ...day, entries: day.entries.slice(0, -1) });
    if (config.banking) {
      if (last.type === "earn") saveBank(bank - last.min);
      else saveBank(bank + last.min);
    }
  }

  const dayLabel = isWeekend() ? "weekend" : "school day";
  const recent = [...day.entries].reverse().slice(0, 8);

  if (!ready) {
    return (
      <div className="ct-root">
        <style>{CSS}</style>
        <div className="ct-loading">Loading…</div>
      </div>
    );
  }

  return (
    <div className="ct-root" style={{ "--accent": kid.accent }}>
      <style>{CSS}</style>

      <header className="ct-head">
        <div className="ct-brand">
          <span className="ct-bolt" aria-hidden>⚡</span>
          <span>Screen Time</span>
        </div>
        <div className="ct-headright">
          <span className={"ct-sync " + syncState}>{SYNC_LABEL[syncState]}</span>
            {admin && (
                <button className="ct-gear" onClick={() => setSetupOpen(true)}>Set up</button>
            )}        </div>
      </header>

      <div className="ct-kids">
        {config.kids.map((k) => (
          <button
            key={k.id}
            className={"ct-kid" + (k.id === activeKid ? " on" : "")}
            style={
              k.id === activeKid
                ? { background: k.accent, borderColor: k.accent }
                : { color: k.accent, borderColor: k.accent }
            }
            onClick={() => switchKid(k.id)}
          >
            {k.name}
          </button>
        ))}
      </div>

      <div className={"ct-meter-card" + (locked ? " locked" : "")}>
        <div className="ct-floats">
          {floats.map((f) => (
            <span key={f.id} className={"ct-float " + (f.positive ? "pos" : "neg")}>{f.text}</span>
          ))}
        </div>
        <div className="ct-remain">{fmt(remaining)}</div>
        <div className="ct-remain-sub">minutes left today</div>
        <div className="ct-track">
          <div className="ct-fill" style={{ width: fillPct + "%" }} />
        </div>
        <div className="ct-meter-foot">
          <span>{capUsedLabel}</span>
          <span>Cap {fmt(cap)} · {dayLabel}</span>
        </div>
        {locked && <div className="ct-lockbar">🔒 Finish today's must-dos to use your time</div>}
      </div>

      <section className="ct-card">
        <h2 className="ct-h2">Today's must-dos <span className="ct-hint">unlocks your time</span></h2>
        <div className="ct-resp">
          {config.responsibilities.map((r) => (
            <button
              key={r.id}
              className={"ct-check" + (day.respDone[r.id] ? " done" : "")}
              onClick={() => toggleResp(r.id)}
            >
              <span className="ct-box">{day.respDone[r.id] ? "✓" : ""}</span>
              {r.label}
            </button>
          ))}
          {config.responsibilities.length === 0 && (
            <p className="ct-empty">No must-dos set. Add some in Set up.</p>
          )}
        </div>
      </section>

      <section className="ct-card">
        <h2 className="ct-h2">Earn more time</h2>
        <div className="ct-chores">
          {config.chores.map((c) => (
            <button key={c.id} className="ct-chore" onClick={() => addEarn(c)}>
              <span className="ct-chore-label">{c.label}</span>
              <span className="ct-chore-min">+{c.min}m</span>
            </button>
          ))}
          {config.chores.length === 0 && (
            <p className="ct-empty">No chores set. Add some in Set up.</p>
          )}
        </div>
      </section>

      <section className="ct-card">
        <h2 className="ct-h2">Use time</h2>
        <div className="ct-spend">
          {[15, 30, 45, 60].map((n) => (
            <button
              key={n}
              className="ct-spendbtn"
              disabled={locked || n > remaining}
              onClick={() => spend(n)}
            >
              {n}m
            </button>
          ))}
        </div>
        <div className="ct-custom">
          <input
            className="ct-input"
            type="number"
            min="1"
            inputMode="numeric"
            placeholder="Custom"
            value={customSpend}
            onChange={(e) => setCustomSpend(e.target.value)}
          />
          <button
            className="ct-usebtn"
            disabled={
              locked ||
              !customSpend ||
              parseInt(customSpend, 10) <= 0 ||
              parseInt(customSpend, 10) > remaining
            }
            onClick={() => spend(parseInt(customSpend, 10))}
          >
            Use it
          </button>
        </div>
      </section>

      <section className="ct-card">
          <div className="ct-hist-head">
              <h2 className="ct-h2">Today's log</h2>
              <div className="ct-hist-actions">
                  {day.entries.length > 0 && (
                      <button className="ct-undo" onClick={undoLast}>↩ Undo</button>
                  )}
                  <button className="ct-undo" onClick={() => setHistoryOpen(true)}>📈 History</button>
              </div>
          </div>
        {recent.length === 0 ? (
          <p className="ct-empty">Nothing yet today. Do a chore to charge up.</p>
        ) : (
          <ul className="ct-log">
            {recent.map((e) => (
              <li key={e.id} className="ct-logrow">
                <span className="ct-logdot" data-t={e.type} />
                <span className="ct-loglabel">{e.label}</span>
                <span className={"ct-logmin " + e.type}>
                  {e.type === "earn" ? "+" : "\u2212"}{e.min}m
                </span>
                <span className="ct-logtime">
                  {new Date(e.ts).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}
                </span>
              </li>
            ))}
          </ul>
        )}
      </section>

      {setupOpen && (
        <Setup config={config} onSave={saveConfig} onClose={() => setSetupOpen(false)} />
      )}

        {historyOpen && (
            <History kid={kid} onClose={() => setHistoryOpen(false)} />
        )}
    </div>
  );
}

/* ------------------------------------------------------------------ */
function Setup({ config, onSave, onClose }) {
  const [c, setC] = useState(JSON.parse(JSON.stringify(config)));
  const [newResp, setNewResp] = useState("");
  const [newChore, setNewChore] = useState("");
  const [newMin, setNewMin] = useState("");

  const up = (patch) => setC((prev) => ({ ...prev, ...patch }));

  function setKid(i, patch) {
    const kids = c.kids.map((k, idx) => (idx === i ? { ...k, ...patch } : k));
    up({ kids });
  }
  function addResp() {
    if (!newResp.trim()) return;
    up({ responsibilities: [...c.responsibilities, { id: uid(), label: newResp.trim() }] });
    setNewResp("");
  }
  function delResp(id) { up({ responsibilities: c.responsibilities.filter((r) => r.id !== id) }); }
  function addChore() {
    const m = parseInt(newMin, 10);
    if (!newChore.trim() || !m || m <= 0) return;
    up({ chores: [...c.chores, { id: uid(), label: newChore.trim(), min: m }] });
    setNewChore("");
    setNewMin("");
  }
  function delChore(id) { up({ chores: c.chores.filter((x) => x.id !== id) }); }
  function save() { onSave(c); onClose(); }

  return (
    <div className="ct-modal" onClick={onClose}>
      <div className="ct-sheet" onClick={(e) => e.stopPropagation()}>
        <div className="ct-sheet-head">
          <h2 className="ct-h2">Set up</h2>
          <button className="ct-x" onClick={onClose}>✕</button>
        </div>

        <div className="ct-sheet-body">
          <h3 className="ct-h3">Names & colors</h3>
          {c.kids.map((k, i) => (
            <div key={k.id} className="ct-kidedit">
              <input
                className="ct-input full"
                value={k.name}
                onChange={(e) => setKid(i, { name: e.target.value })}
              />
              <div className="ct-swatches">
                {ACCENTS.map((a) => (
                  <button
                    key={a}
                    className={"ct-swatch" + (k.accent === a ? " on" : "")}
                    style={{ background: a }}
                    onClick={() => setKid(i, { accent: a })}
                  />
                ))}
              </div>
            </div>
          ))}

          <h3 className="ct-h3">Daily caps</h3>
          <div className="ct-caprow">
            <label className="ct-caplabel">
              School day
              <input
                className="ct-input"
                type="number"
                value={c.caps.school}
                onChange={(e) => up({ caps: { ...c.caps, school: parseInt(e.target.value, 10) || 0 } })}
              />
              <span className="ct-unit">min</span>
            </label>
            <label className="ct-caplabel">
              Weekend
              <input
                className="ct-input"
                type="number"
                value={c.caps.weekend}
                onChange={(e) => up({ caps: { ...c.caps, weekend: parseInt(e.target.value, 10) || 0 } })}
              />
              <span className="ct-unit">min</span>
            </label>
          </div>

          <h3 className="ct-h3">Saving mode</h3>
          <button
            className={"ct-toggle" + (c.banking ? " on" : "")}
            onClick={() => up({ banking: !c.banking })}
          >
            <span className="ct-knob" />
            <span className="ct-toggle-text">
              {c.banking ? "Banking on — minutes carry over" : "Use-it-or-lose-it (resets daily)"}
            </span>
          </button>
          <p className="ct-note">
            With banking on, earned minutes build up over time. The daily cap still limits how much
            can be used in one day.
          </p>

          <h3 className="ct-h3">Must-dos (unlock spending)</h3>
          {c.responsibilities.map((r) => (
            <div key={r.id} className="ct-editrow">
              <span>{r.label}</span>
              <button className="ct-del" onClick={() => delResp(r.id)}>✕</button>
            </div>
          ))}
          <div className="ct-addrow">
            <input
              className="ct-input full"
              placeholder="Add a must-do"
              value={newResp}
              onChange={(e) => setNewResp(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && addResp()}
            />
            <button className="ct-add" onClick={addResp}>Add</button>
          </div>

          <h3 className="ct-h3">Earning chores</h3>
          {c.chores.map((x) => (
            <div key={x.id} className="ct-editrow">
              <span>{x.label}</span>
              <span className="ct-editmin">+{x.min}m</span>
              <button className="ct-del" onClick={() => delChore(x.id)}>✕</button>
            </div>
          ))}
          <div className="ct-addrow">
            <input
              className="ct-input full"
              placeholder="Add a chore"
              value={newChore}
              onChange={(e) => setNewChore(e.target.value)}
            />
            <input
              className="ct-input mins"
              type="number"
              placeholder="min"
              value={newMin}
              onChange={(e) => setNewMin(e.target.value)}
            />
            <button className="ct-add" onClick={addChore}>Add</button>
          </div>
        </div>

        <div className="ct-sheet-foot">
          <button className="ct-save" onClick={save}>Save changes</button>
        </div>
      </div>
    </div>
  );
}
    function History({ kid, onClose }) {
        const data = gatherHistory(kid.id);
        const recent = data.slice(-14);
        const max = Math.max(1, ...recent.map((d) => Math.max(d.earned, d.used)));
        const now = new Date();
        const within = (d, n) => (now - new Date(d.date + "T00:00:00")) / 86400000 < n;
        const last7 = data.filter((d) => within(d, 7));
        const earned7 = last7.reduce((s, d) => s + d.earned, 0);
        const used7 = last7.reduce((s, d) => s + d.used, 0);
        const fmtDate = (s) =>
            new Date(s + "T00:00:00").toLocaleDateString([], { weekday: "short", month: "short", day: "numeric" });

        return (
            <div className="ct-modal" onClick={onClose}>
                <div className="ct-sheet" onClick={(e) => e.stopPropagation()}>
                    <div className="ct-sheet-head">
                        <h2 className="ct-h2">History — {kid.name}</h2>
                        <button className="ct-x" onClick={onClose}>✕</button>
                    </div>
                    <div className="ct-sheet-body">
                        <div className="ct-tiles">
                            <div className="ct-tile"><div className="ct-tile-num">{fmt(earned7)}</div><div className="ct-tile-lab">earned · last 7 days</div></div>
                            <div className="ct-tile"><div className="ct-tile-num">{fmt(used7)}</div><div className="ct-tile-lab">used · last 7 days</div></div>
                            <div className="ct-tile"><div className="ct-tile-num">{data.length}</div><div className="ct-tile-lab">days tracked</div></div>
                        </div>
                        {recent.length === 0 ? (
                            <p className="ct-empty">No history yet. It fills in as chores and screen time get logged each day.</p>
                        ) : (
                            <div className="ct-hlist">
                                {recent.slice().reverse().map((d) => (
                                    <div key={d.date} className="ct-hrow">
                                        <div className="ct-hdate">{fmtDate(d.date)}</div>
                                        <div className="ct-hbars">
                                            <div className="ct-hbarwrap">
                                                <div className="ct-hbar earn" style={{ width: (d.earned / max) * 100 + "%" }} />
                                                <span className="ct-hnum">+{d.earned}</span>
                                            </div>
                                            <div className="ct-hbarwrap">
                                                <div className="ct-hbar use" style={{ width: (d.used / max) * 100 + "%" }} />
                                                <span className="ct-hnum">{"\u2212"}{d.used}</span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                        <div className="ct-hlegend">
                            <span><i className="ct-dot earn" /> earned</span>
                            <span><i className="ct-dot use" /> used</span>
                        </div>
                    </div>
                </div>
            </div>
        );
    }
/* ------------------------------------------------------------------ */
